services:
  ocean-market:
    image: purpleshadows/market-empower-x:latest
    container_name: ocean-market
    restart: unless-stopped
    expose:
      - "8008"
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST}
      VIRTUAL_PORT: ${VIRTUAL_PORT}
      LETSENCRYPT_HOST: ${LETSENCRYPT_HOST}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      NODE_ENV: ${NODE_ENV}

      NEXT_PUBLIC_PROVIDER_URL: ${NEXT_PUBLIC_PROVIDER_URL}
      NEXT_PUBLIC_METADATACACHE_URI: ${NEXT_PUBLIC_METADATACACHE_URI}
      NEXT_PUBLIC_NODE_URI_INDEXED: ${NEXT_PUBLIC_NODE_URI_INDEXED}
      NEXT_PUBLIC_NODE_URI_MAP: ${NEXT_PUBLIC_NODE_URI_MAP}

      NEXT_PUBLIC_IPFS_GATEWAY: ${NEXT_PUBLIC_IPFS_GATEWAY}
      NEXT_PUBLIC_IPFS_UPLOAD_URL: ${NEXT_PUBLIC_IPFS_UPLOAD_URL}
      NEXT_PUBLIC_IPFS_DELETE_URL: ${NEXT_PUBLIC_IPFS_DELETE_URL}
      IPFS_JWT: ${IPFS_JWT}
      NEXT_PUBLIC_IPFS_UNPIN_FILES: ${NEXT_PUBLIC_IPFS_UNPIN_FILES}

      NEXT_PUBLIC_ALLOWED_ERC20_ADDRESSES: ${NEXT_PUBLIC_ALLOWED_ERC20_ADDRESSES}
      NEXT_PUBLIC_CONSUME_MARKET_ORDER_FEE_MAP: ${NEXT_PUBLIC_CONSUME_MARKET_ORDER_FEE_MAP}
      NEXT_PUBLIC_CONSUME_MARKET_FEE: ${NEXT_PUBLIC_CONSUME_MARKET_FEE}
      NEXT_PUBLIC_MARKET_FEE_ADDRESS: ${NEXT_PUBLIC_MARKET_FEE_ADDRESS}

      NEXT_PUBLIC_ENCRYPT_ASSET: ${NEXT_PUBLIC_ENCRYPT_ASSET}
      NEXT_PUBLIC_DATASPACE: ${NEXT_PUBLIC_DATASPACE}
      NEXT_PUBLIC_HIDE_ONBOARDING_MODULE_BY_DEFAULT: ${NEXT_PUBLIC_HIDE_ONBOARDING_MODULE_BY_DEFAULT}
      NEXT_PUBLIC_MAX_LICENSE_FILE_SIZE_KB: ${NEXT_PUBLIC_MAX_LICENSE_FILE_SIZE_KB}

      NEXT_PUBLIC_SSI_ENABLED: ${NEXT_PUBLIC_SSI_ENABLED}
      NEXT_PUBLIC_SSI_WALLET_API: ${NEXT_PUBLIC_SSI_WALLET_API}
      NEXT_PUBLIC_SSI_UI_URL: ${NEXT_PUBLIC_SSI_UI_URL}
      NEXT_PUBLIC_SSI_DEFAULT_POLICIES_URL: ${NEXT_PUBLIC_SSI_DEFAULT_POLICIES_URL}
      NEXT_PUBLIC_OPA_SERVER_URL: ${NEXT_PUBLIC_OPA_SERVER_URL}

      NEXT_PUBLIC_AUTH_ENABLED: ${NEXT_PUBLIC_AUTH_ENABLED}
      NEXT_PUBLIC_AUTH_PROVIDER: ${NEXT_PUBLIC_AUTH_PROVIDER}
      NEXT_PUBLIC_OIDC_ISSUER: ${NEXT_PUBLIC_OIDC_ISSUER}
      NEXT_PUBLIC_OIDC_CLIENT_ID: ${NEXT_PUBLIC_OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      NEXT_PUBLIC_OIDC_REDIRECT_URI: ${NEXT_PUBLIC_OIDC_REDIRECT_URI}
      NEXT_PUBLIC_OIDC_TOKEN_URL: ${NEXT_PUBLIC_OIDC_TOKEN_URL}
      NEXT_PUBLIC_OIDC_SIGNUP_FLOW: ${NEXT_PUBLIC_OIDC_SIGNUP_FLOW}
      NEXT_PUBLIC_FEDERATED_OIDC_ISSUERS: ${NEXT_PUBLIC_FEDERATED_OIDC_ISSUERS}
      OIDC_FEDERATION_END_SESSION_URL: ${OIDC_FEDERATION_END_SESSION_URL}

      NEXT_PUBLIC_IMPRINT_URL: ${NEXT_PUBLIC_IMPRINT_URL}
      NEXT_PUBLIC_TC_URL: ${NEXT_PUBLIC_TC_URL}
      NEXT_PUBLIC_PP_URL: ${NEXT_PUBLIC_PP_URL}
      NEXT_PUBLIC_CP_URL: ${NEXT_PUBLIC_CP_URL}
      NEXT_PUBLIC_DPUA_URL: ${NEXT_PUBLIC_DPUA_URL}
    networks:
      - docker_default

networks:
  docker_default:
    external: true
